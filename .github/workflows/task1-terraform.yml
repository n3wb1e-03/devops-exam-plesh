name: Task 1 - Terraform CI/CD

on:
  push:
    paths:
      - 'task1/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (apply / destroy)'
        required: true
        default: 'apply'
      prefix:
        description: 'Your lastname (used as prefix for resources)'
        required: true
        default: 'plesh'

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
  TF_VAR_prefix: ${{ github.event.inputs.prefix || 'plesh' }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./task1
    steps:
      - uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (Check correctness)
        id: plan
        run: terraform plan -out=tfplan
        # Якщо plan падає, конвеєр зупиняється.

      - name: Terraform Apply
        if: github.event.inputs.action != 'destroy' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy (Extra Points Option)
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
