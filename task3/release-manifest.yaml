---
apiVersion: v1
kind: Namespace
metadata:
  name: release
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: release
spec:
  replicas: 2 # Для релізу робимо 2 копії (High Availability)
  selector:
    matchLabels:
      app: devops-app
      env: release
  template:
    metadata:
      labels:
        app: devops-app
        env: release
    spec:
      containers:
      - name: my-app
        # Переконайтеся, що ви збираєте та пушите образ з цим тегом!
        image: ghcr.io/n3wb1e-03/devops-exam-plesh/devops-exam-app:release
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: release
spec:
  type: NodePort
  selector:
    app: devops-app
    env: release
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30003 # Інший порт, щоб уникнути конфлікту з Dev
