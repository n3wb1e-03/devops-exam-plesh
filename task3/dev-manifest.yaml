---
apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: dev
spec:
  replicas: 1 # Для dev достатньо 1 копії
  imagePullPolicy: Always
  selector:
    matchLabels:
      app: devops-app
      env: dev
  template:
    metadata:
      labels:
        app: devops-app
        env: dev
    spec:
      containers:
      - name: my-app
        # Використовуємо образ з тегом dev
        image: ghcr.io/n3wb1e-03/devops-exam-plesh/devops-exam-app:dev
        imagePullPolicy: Always
        ports:
        - containerPort: 8000 # Змініть на порт вашого додатку (Django зазвичай 8000)
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: dev
spec:
  type: NodePort
  selector:
    app: devops-app
    env: dev
  ports:
    - port: 80
      targetPort: 8000 # Повинен збігатися з containerPort
      nodePort: 30002  # Використовуємо дозволений порт (від 30000 до 32767)
